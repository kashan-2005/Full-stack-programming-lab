<!DOCTYPE html>
<html>
<head>
    <title>Task 7 - JSON</title>
    <style>
        body { font-family: Arial; background:#e6f0ff; margin:20px; }
        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>Student Data Using JSON</h1>
<div class="box" id="output"></div>

<script>
let students = [
    {name:"Ali",age:20,semester:6,courses:["JS","DB"]},
    {name:"Sara",age:21,semester:5,courses:["AI","ML"]},
    {name:"Ahmed",age:22,semester:4,courses:["React","Node"]}
];

let jsonData = JSON.stringify(students);
let parsed = JSON.parse(jsonData);

let content = "";

parsed.forEach(({name,age,semester,courses})=>{
    content += `
    <div style="margin-bottom:15px;">
        <strong>${name}</strong><br>
        Age: ${age}<br>
        Semester: ${semester}<br>
        Courses: ${courses.join(", ")}
    </div>`;
});

document.getElementById("output").innerHTML = content;
</script>

</body>
</html>
