<!DOCTYPE html>
<html>
<head>
    <title>Task 3 - Async Loader</title>
    <style>
        body { font-family: Arial; background:#eef2f3; margin:20px; }
        h1 { text-align:center; }
        .container {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>Asynchronous Data Loader</h1>
<div class="container" id="output">Loading users...</div>

<script>
function fetchUsers() {
    return new Promise((resolve) => {
        setTimeout(() => {
            resolve([
                {id:1, name:"Ali"},
                {id:2, name:"Ahmed"}
            ]);
        }, 3000);
    });
}

fetchUsers().then(users => {
    let content = "<h3>Users Loaded:</h3>";
    users.forEach(u => {
        content += `ID: ${u.id}, Name: ${u.name}<br>`;
    });
    document.getElementById("output").innerHTML = content;
});
</script>

</body>
</html>
