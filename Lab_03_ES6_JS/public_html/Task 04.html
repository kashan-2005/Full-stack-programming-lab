<!DOCTYPE html>
<html>
<head>
    <title>Task 4 - Set</title>
    <style>
        body { font-family: Arial; background:#fdfbfb; margin:20px; }
        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>Unique Course Registration</h1>
<div class="box" id="output"></div>

<script>
let courses = new Set(["JS","HTML","CSS","JS"]);

let content = "";
for(let c of courses){
    content += c + "<br>";
}

content += "<br>Total Unique Courses: " + courses.size;

document.getElementById("output").innerHTML = content;
</script>

</body>
</html>
